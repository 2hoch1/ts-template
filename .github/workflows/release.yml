name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist
            node_modules

  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    needs: test
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}} (#{{NUMBER}})",
              "categories": [
                { "title": "## Breaking Changes", "labels": ["breaking change", "api changes"] },
                { "title": "## Security", "labels": ["security"] },
                { "title": "## Features", "labels": ["feature request"] },
                { "title": "## Bug Fixes", "labels": ["bug"] },
                { "title": "## Performance", "labels": ["performance"] },
                { "title": "## Documentation", "labels": ["docs"] },
                { "title": "## UI", "labels": ["ui", "styles"] },
                { "title": "## Infrastructure", "labels": ["build", "ci", "infra"] },
                { "title": "## Tests", "labels": ["tests"] },
                { "title": "## Maintenance", "labels": ["chore", "refactor", "typings", "error handling", "interactions", "utility"] },
                { "title": "## Other Changes", "labels": [] }
              ],
              "label_extractor": [
                { "pattern": ".*", "on_property": "labels", "method": "match" }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
